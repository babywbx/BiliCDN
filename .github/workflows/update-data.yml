name: Update CDN Data

on:
  schedule:
    - cron: '0 4 * * 1'
  workflow_dispatch:
    inputs:
      attempt:
        description: 'Retry attempt number'
        default: '1'

concurrency:
  group: update-data
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  update-data:
    name: Scan / Update
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o bilicdn .

      - name: Show runner IP
        run: curl -s https://api.ipify.org && echo

      - name: Checkout data branch
        uses: actions/checkout@v6
        with:
          ref: data
          path: data_branch
          fetch-depth: 0

      - name: Build historical domain list
        run: |
          cd data_branch
          # Extract all unique domains ever committed to domains.txt
          git log --all -p -- domains.txt 2>/dev/null \
            | grep "^+" | grep -v "^+++" | sed 's/^+//' \
            | grep -v -E "^(core|qoe|vanadium|api|bvc|bvc-drm|data|activity|cloudapp|openupos|skynet|transfer|proxy-tf-all-ws|bfs-tf-all-js|txy-fmp4hls|jscs-luffy-upcdntx|live-push|bdy\.live-push|txy2\.live-push|txy3\.live-push)\." \
            | sort -u > ../historical_domains.txt
          COUNT=$(wc -l < ../historical_domains.txt | tr -d ' ')
          echo "Historical domains: $COUNT"
          cd ..

      - name: Scan CDN nodes
        run: |
          if [ -s historical_domains.txt ]; then
            echo "Rechecking historical domains + full scan"
            ./bilicdn -quiet -diff historical_domains.txt -o data/domains.txt
          else
            echo "No history, running full scan"
            ./bilicdn -quiet -o data/domains.txt
          fi

      - name: Show scan results
        if: always()
        run: |
          # Check final output first, then temp files
          OUT="data/domains.txt"
          if [ ! -f "$OUT" ]; then
            # Scan was interrupted — find the temp file
            TEMP=$(ls data/.domains.txt.*.tmp 2>/dev/null | head -1)
            if [ -n "$TEMP" ]; then
              echo "::notice::Scan interrupted, recovering from temp file"
              sort -u "$TEMP" > "$OUT"
            fi
          fi
          if [ -f "$OUT" ]; then
            COUNT=$(wc -l < "$OUT" | tr -d ' ')
            echo "::notice::Found $COUNT domains (may be partial if scan was interrupted)"
            echo "--- domains.txt ($COUNT lines) ---"
            cat "$OUT"
          else
            echo "::warning::No output file found"
          fi

      - name: Validate scan results
        env:
          GH_TOKEN: ${{ github.token }}
          ATTEMPT: ${{ inputs.attempt || '1' }}
        run: |
          OUT="data/domains.txt"
          if [ ! -f "$OUT" ]; then
            echo "::error::No domains.txt found"
            exit 1
          fi
          COUNT=$(wc -l < "$OUT" | tr -d ' ')
          MIN=100
          if [ "$COUNT" -ge "$MIN" ]; then
            echo "Validated: $COUNT domains (>= $MIN)"
            exit 0
          fi

          echo "::warning::Only $COUNT domains found (minimum $MIN)"
          if [ "$ATTEMPT" -lt 2 ]; then
            NEXT=$((ATTEMPT + 1))
            echo "::notice::Auto-retrying (attempt $NEXT) on a fresh runner..."
            gh workflow run update-data.yml -f attempt="$NEXT"
            exit 1
          fi
          echo "::error::Still below threshold after retry. Giving up."
          exit 1

      - name: Convert formats
        run: |
          ./bilicdn convert -i data/domains.txt -o data/nodes.json
          ./bilicdn convert -i data/domains.txt -o data/nodes.yml
          ./bilicdn convert -i data/domains.txt -o data/nodes.txt
          ./bilicdn convert -i data/domains.txt -o data/nodes.md

      - name: Sync, Commit and Push to data branch
        id: push
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.BOT_SSH_SIGNING_KEY }}" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key

          rsync -av --delete --exclude='.git/' data/ data_branch/
          cd data_branch

          git config user.name 'wbxBot'
          git config user.email '224158880+wbxbot@users.noreply.github.com'
          git config gpg.format ssh
          git config user.signingkey ~/.ssh/signing_key
          git config commit.gpgsign true

          git add .
          if git diff --staged --quiet; then
            echo "No changes in data. Nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Changes detected. Proceeding with commit."
          TIMESTAMP=$(TZ=Asia/Shanghai date +"%Y-%m-%d %H:%M UTC+8")
          git commit -m "🤖 chore(data): auto-update CDN nodes ($TIMESTAMP)"
          git push origin data
          echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Count domains
        if: steps.push.outputs.changed == 'true'
        id: count
        run: |
          TOTAL=$(wc -l < data/domains.txt | tr -d ' ')
          REGIONS=$(jq 'keys | length' data/nodes.json)
          TIMESTAMP=$(TZ=Asia/Shanghai date +"%Y-%m-%d %H:%M UTC+8")
          echo "total=$TOTAL" >> "$GITHUB_OUTPUT"
          echo "regions=$REGIONS" >> "$GITHUB_OUTPUT"
          echo "timestamp=$TIMESTAMP" >> "$GITHUB_OUTPUT"

      - name: Update Release
        if: steps.push.outputs.changed == 'true'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ github.token }}
          release_name: CDN Data (Auto Update)
          tag: latest-data
          file: data/*
          file_glob: true
          overwrite: true
          make_latest: false
          body: |
            ## Bilibili CDN Nodes

            > Updated: ${{ steps.count.outputs.timestamp }}

            **${{ steps.count.outputs.total }}** domains across **${{ steps.count.outputs.regions }}** regions.

            ### Downloads

            | File | Description |
            |------|-------------|
            | `domains.txt` | Raw domain list, one per line (for scripts/programs) |
            | `nodes.json` | Grouped by region (JSON) |
            | `nodes.yml` | Grouped by region (YAML) |
            | `nodes.txt` | Grouped by region (plain text) |
            | `nodes.md` | Grouped by region (Markdown) |

            ### CDN API

            ```
            https://bilicdn.pages.dev/nodes.json
            https://bilicdn.pages.dev/nodes.yml
            https://bilicdn.pages.dev/nodes.txt
            https://bilicdn.pages.dev/nodes.md
            https://bilicdn.pages.dev/domains.txt
            ```

            ### Links

            - 🌐 [Web UI](https://bilicdn.pages.dev)
            - 📦 [Data Branch](https://github.com/babywbx/BiliCDN/tree/data)

      - name: Purge CDN cache
        if: always()
        run: |
          for f in nodes.json nodes.yml nodes.txt nodes.md domains.txt api/updated; do
            curl -s "https://bilicdn.pages.dev/${f}?purge" -o /dev/null -w "${f}: HTTP %{http_code}\n"
          done
