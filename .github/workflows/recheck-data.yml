name: Recheck CDN Data

on:
  schedule:
    # Runs at 00:00 Asia/Shanghai.
    - cron: '0 16 * * *'
  workflow_dispatch:

concurrency:
  group: update-data
  cancel-in-progress: false

permissions:
  contents: write

env:
  DATA_DIR: data
  DATA_BRANCH_DIR: data_branch
  DOMAINS_FILE: data/domains.txt
  HISTORICAL_DOMAINS_FILE: historical_domains.txt
  MIN_DOMAINS: 100
  CDN_REFRESH_URL: https://bilicdn.pages.dev/api/refresh
  EXCLUDED_DOMAIN_PREFIX_PATTERN: '^(core|qoe|vanadium|api|bvc|bvc-drm|data|activity|cloudapp|openupos|skynet|transfer|proxy-tf-all-ws|bfs-tf-all-js|txy-fmp4hls|jscs-luffy-upcdntx|live-push|bdy[.]live-push|txy2[.]live-push|txy3[.]live-push)[.]'

defaults:
  run:
    shell: bash

jobs:
  recheck-data:
    name: Recheck / Update
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout main branch
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -o bilicdn .

      - name: Checkout data branch
        uses: actions/checkout@v6
        with:
          ref: data
          path: ${{ env.DATA_BRANCH_DIR }}
          fetch-depth: 0

      - name: Build historical domain list
        id: history
        run: |
          set -Eeuo pipefail

          (
            cd "$DATA_BRANCH_DIR"
            git log --all -p -- domains.txt 2>/dev/null || true
          ) | awk -v pattern="$EXCLUDED_DOMAIN_PREFIX_PATTERN" '
            /^\+/ && !/^\+\+\+/ {
              sub(/^\+/, "")
              if ($0 != "" && $0 !~ pattern) {
                print
              }
            }
          ' | sort -u > "$HISTORICAL_DOMAINS_FILE"

          count=$(wc -l < "$HISTORICAL_DOMAINS_FILE" | tr -d ' ')
          echo "Historical domains: $count"
          echo "count=$count" >> "$GITHUB_OUTPUT"

          {
            echo "### Historical domain list"
            echo
            echo "- Domains discovered from history: \`$count\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Recheck domains
        if: steps.history.outputs.count != '0'
        run: |
          set -Eeuo pipefail

          ./bilicdn -quiet -recheck-only \
            -diff "$HISTORICAL_DOMAINS_FILE" \
            -http-retries 3 \
            -http-timeout 5s \
            -o "$DOMAINS_FILE"

      - name: Validate recheck results
        id: validate
        env:
          HISTORICAL_COUNT: ${{ steps.history.outputs.count }}
        run: |
          set -Eeuo pipefail

          if [ "$HISTORICAL_COUNT" = "0" ]; then
            echo "::warning::No historical domains found. Nothing to recheck."
            echo "valid=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ ! -f "$DOMAINS_FILE" ]; then
            echo "::error::No domains.txt found after recheck."
            exit 1
          fi

          count=$(wc -l < "$DOMAINS_FILE" | tr -d ' ')
          if [ "$count" -lt "$MIN_DOMAINS" ]; then
            echo "::error::Only $count domains found after recheck. Minimum required is $MIN_DOMAINS."
            exit 1
          fi

          echo "Validated: $count domains (>= $MIN_DOMAINS)"
          {
            echo "valid=true"
            echo "count=$count"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Recheck validation"
            echo
            echo "- Domains after recheck: \`$count\`"
            echo "- Minimum required: \`$MIN_DOMAINS\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Convert formats
        if: steps.validate.outputs.valid == 'true'
        run: |
          set -Eeuo pipefail

          for format in json yml txt md; do
            ./bilicdn convert -i "$DOMAINS_FILE" -o "$DATA_DIR/nodes.$format"
          done

      - name: Sync, Commit and Push to data branch
        if: steps.validate.outputs.valid == 'true'
        id: push
        env:
          BOT_SSH_SIGNING_KEY: ${{ secrets.BOT_SSH_SIGNING_KEY }}
        run: |
          set -Eeuo pipefail

          rsync -av --delete --exclude='.git/' "$DATA_DIR"/ "$DATA_BRANCH_DIR"/
          cd "$DATA_BRANCH_DIR"

          git add .
          if git diff --staged --quiet; then
            echo "No changes in data. Nothing to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            {
              echo "### Data branch update"
              echo
              echo "- Changed: \`false\`"
            } >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi

          if [ -z "$BOT_SSH_SIGNING_KEY" ]; then
            echo "::error::BOT_SSH_SIGNING_KEY is not set. Cannot create a signed data commit."
            exit 1
          fi

          mkdir -p ~/.ssh
          printf '%s\n' "$BOT_SSH_SIGNING_KEY" > ~/.ssh/signing_key
          chmod 600 ~/.ssh/signing_key

          git config user.name 'wbxBot'
          git config user.email '224158880+wbxbot@users.noreply.github.com'
          git config gpg.format ssh
          git config user.signingkey ~/.ssh/signing_key
          git config commit.gpgsign true

          timestamp=$(TZ=Asia/Shanghai date +"%Y-%m-%d %H:%M UTC+8")
          git commit -m "🤖 chore(data): recheck CDN nodes ($timestamp)"

          for attempt in 1 2 3; do
            if git push origin data; then
              break
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to push data branch after $attempt attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 5))
            echo "::warning::Push attempt $attempt failed. Retrying in ${sleep_seconds}s."
            sleep "$sleep_seconds"
          done

          commit_sha=$(git rev-parse HEAD)
          commit_short=$(git rev-parse --short HEAD)
          {
            echo "changed=true"
            echo "commit=$commit_sha"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### Data branch update"
            echo
            echo "- Changed: \`true\`"
            echo "- Commit: \`$commit_short\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Count domains
        if: steps.push.outputs.changed == 'true'
        id: count
        run: |
          set -Eeuo pipefail

          total=$(wc -l < "$DOMAINS_FILE" | tr -d ' ')
          regions=$(jq 'keys | length' "$DATA_DIR/nodes.json")
          timestamp=$(TZ=Asia/Shanghai date +"%Y-%m-%d %H:%M UTC+8")

          {
            echo "total=$total"
            echo "regions=$regions"
            echo "timestamp=$timestamp"
          } >> "$GITHUB_OUTPUT"

          {
            echo "### CDN data snapshot"
            echo
            echo "- Domains: \`$total\`"
            echo "- Regions: \`$regions\`"
            echo "- Updated: \`$timestamp\`"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Point release tag at data branch
        if: steps.push.outputs.changed == 'true'
        run: |
          set -Eeuo pipefail

          git fetch origin data
          git tag -f latest-data origin/data

          for attempt in 1 2 3; do
            if git push origin -f refs/tags/latest-data; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::Failed to update latest-data tag after $attempt attempts."
              exit 1
            fi

            sleep_seconds=$((attempt * 5))
            echo "::warning::Tag push attempt $attempt failed. Retrying in ${sleep_seconds}s."
            sleep "$sleep_seconds"
          done

      - name: Update Release
        if: steps.push.outputs.changed == 'true'
        uses: svenstaro/upload-release-action@v2
        with:
          repo_token: ${{ github.token }}
          release_name: CDN Data (Auto Update)
          tag: latest-data
          file: ${{ env.DATA_DIR }}/*
          file_glob: true
          overwrite: true
          make_latest: false
          body: |
            ## Bilibili CDN Nodes

            > Updated: ${{ steps.count.outputs.timestamp }}

            **${{ steps.count.outputs.total }}** domains across **${{ steps.count.outputs.regions }}** regions.

            ### Downloads

            | File | Description |
            |------|-------------|
            | `domains.txt` | Raw domain list, one per line (for scripts/programs) |
            | `nodes.json` | Grouped by region (JSON) |
            | `nodes.yml` | Grouped by region (YAML) |
            | `nodes.txt` | Grouped by region (plain text) |
            | `nodes.md` | Grouped by region (Markdown) |

            ### CDN API

            ```
            https://bilicdn.pages.dev/nodes.json
            https://bilicdn.pages.dev/nodes.yml
            https://bilicdn.pages.dev/nodes.txt
            https://bilicdn.pages.dev/nodes.md
            https://bilicdn.pages.dev/domains.txt
            ```

            ### Links

            - 🌐 [Web UI](https://bilicdn.pages.dev)
            - 📦 [Data Branch](https://github.com/babywbx/BiliCDN/tree/data)

      - name: Refresh CDN data endpoint
        if: always() && steps.push.outputs.changed == 'true'
        env:
          CF_REFRESH_TOKEN: ${{ secrets.CF_REFRESH_TOKEN }}
        run: |
          set -Eeuo pipefail

          if [ -z "${CF_REFRESH_TOKEN}" ]; then
            echo "::warning::CF_REFRESH_TOKEN is not set. Skipping CDN refresh."
            exit 0
          fi

          max_attempts=5
          delay_seconds=5

          for attempt in $(seq 1 "$max_attempts"); do
            echo "Refreshing CDN data endpoint (attempt $attempt/$max_attempts)..."
            response_file=$(mktemp)
            status=$(curl -sS \
              --connect-timeout 10 \
              --max-time 30 \
              -o "$response_file" \
              -w "%{http_code}" \
              -X POST \
              -H "Authorization: Bearer ${CF_REFRESH_TOKEN}" \
              "$CDN_REFRESH_URL") || status="curl-error"

            body=$(awk 'BEGIN { out = "" } { gsub(/\r/, ""); if (out != "") out = out " "; out = out $0 } END { print substr(out, 1, 1000) }' "$response_file")
            rm -f "$response_file"

            case "$status" in
              2*)
                echo "CDN data endpoint refreshed."
                {
                  echo "### CDN refresh"
                  echo
                  echo "- Status: \`$status\`"
                  echo "- Attempts: \`$attempt\`"
                } >> "$GITHUB_STEP_SUMMARY"
                exit 0
                ;;
            esac

            if [ "$attempt" -lt "$max_attempts" ]; then
              echo "::warning::CDN refresh attempt $attempt failed with status $status: $body. Retrying in ${delay_seconds}s."
              sleep "$delay_seconds"
              delay_seconds=$((delay_seconds * 2))
            else
              echo "::warning::CDN refresh failed after $max_attempts attempts with status $status: $body"
              {
                echo "### CDN refresh warning"
                echo
                echo "Data branch and release updates may have completed, but the CDN refresh endpoint did not respond successfully."
                echo
                echo "- Status: \`$status\`"
                echo "- Response: \`$body\`"
              } >> "$GITHUB_STEP_SUMMARY"
            fi
          done

          exit 0
